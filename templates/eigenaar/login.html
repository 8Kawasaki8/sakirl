<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eigenaar Login — {{ kapper_naam }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <link rel="manifest" href="/eigenaar/manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='eigenaar.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="eigenaar-body">

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='favicon.svg') }}" width="64" height="64" alt="logo">
    </div>
    <h1 class="login-titel">{{ kapper_naam }}</h1>
    <p class="login-sub">Eigenaar toegang</p>

    {% if fout %}
    <div class="alert alert-fout">{{ fout }}</div>
    {% endif %}

    <form method="POST" action="/eigenaar/login">
      <div class="form-group">
        <label for="wachtwoord">Wachtwoord</label>
        <input type="password" id="wachtwoord" name="wachtwoord" placeholder="Voer je wachtwoord in" required autofocus>
      </div>
      <button type="submit" class="btn btn-gold btn-full">Inloggen</button>
    </form>

    <div id="pwa-install-wrap" style="display:none;margin-top:20px;text-align:center;">
      <button id="pwa-install-btn" class="btn btn-ghost btn-full" style="display:none;">
        Installeer als app
      </button>
      <p id="ios-install-hint" style="display:none;font-size:0.85rem;color:var(--muted);line-height:1.6;">
        Tik op <strong>Delen</strong> → <strong>Zet op beginscherm</strong> om de app te installeren.
      </p>
    </div>
  </div>
</div>

<script>
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const isIOS    = /iPhone|iPad|iPod/i.test(navigator.userAgent);

if (isMobile) {
  if (isIOS) {
    document.getElementById('pwa-install-wrap').style.display = 'block';
    document.getElementById('ios-install-hint').style.display = 'block';
  } else {
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('pwa-install-wrap').style.display = 'block';
      document.getElementById('pwa-install-btn').style.display = 'block';
    });
    document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('pwa-install-wrap').style.display = 'none';
      }
    });
  }
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js');
}
</script>
</body>
</html>
